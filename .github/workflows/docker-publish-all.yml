name: 构建并推送所有 Docker 镜像（支持多架构）

on:
  push:
    branches: [main]
  pull_request:
    branches: [main] # PR 时构建但不 push，用于测试
  workflow_dispatch: # 手动触发

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push-all:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # 必须，用于推送 GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ==================== 基础设施 ====================
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Frontend（本地构建，多架构） ====================
      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-town-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }} # 只在 main 真正 push
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ github.ref_name }}-frontend
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-frontend

      # ==================== Backend（官方镜像，多架构安全 retag） ====================
      - name: Retag backend with imagetools (multi-arch safe)
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-town-backend:latest \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-town-backend:${{ github.sha }} \
            ghcr.io/get-convex/convex-backend:latest

      # ==================== Dashboard（官方镜像，多架构安全 retag） ====================
      - name: Sync Dashboard Image (Multi-arch)
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-town-dashboard:latest \
            -t ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-town-dashboard:${{ github.sha }} \
            ghcr.io/get-convex/convex-dashboard:latest
