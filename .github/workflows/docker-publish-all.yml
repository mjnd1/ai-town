name: Build and Push All Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-push-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==================== 构建 frontend（你的修改在这里生效） ====================
      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-town-frontend:latest
            ghcr.io/${{ github.repository_owner }}/ai-town-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== 拉取并推送 backend（官方镜像镜像） ====================
      - name: Pull, retag and push backend
        run: |
          docker pull ghcr.io/get-convex/convex-backend:latest
          docker tag ghcr.io/get-convex/convex-backend:latest ghcr.io/${{ github.repository_owner }}/ai-town-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/ai-town-backend:latest

      # ==================== 拉取并推送 dashboard（官方镜像镜像） ====================
      - name: Pull, retag and push dashboard
        run: |
          docker pull ghcr.io/get-convex/convex-dashboard:latest
          docker tag ghcr.io/get-convex/convex-dashboard:latest ghcr.io/${{ github.repository_owner }}/ai-town-dashboard:latest
          docker push ghcr.io/${{ github.repository_owner }}/ai-town-dashboard:latest
